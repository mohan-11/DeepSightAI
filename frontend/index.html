<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSight AI | Advanced Deepfake Detection</title>
    <meta name="description" content="Professional Multimodal Deepfake Detection System for Images, Videos, and Audio.">
    
    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: '#00F260',
                            secondary: '#0575E6',
                            accent: '#7F00FF',
                            dark: '#0a0a0c',
                            card: 'rgba(23, 23, 26, 0.7)'
                        },
                        status: {
                            real: '#00F260',
                            fake: '#FF3366',
                            warning: '#FFD700'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        tech: ['Orbitron', 'sans-serif'],
                        mono: ['Fira Code', 'monospace']
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'glow': 'glow 2s ease-in-out infinite alternate',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        glow: {
                            '0%': { boxShadow: '0 0 5px rgba(0, 242, 96, 0.2), 0 0 10px rgba(0, 242, 96, 0.1)' },
                            '100%': { boxShadow: '0 0 20px rgba(0, 242, 96, 0.5), 0 0 30px rgba(0, 242, 96, 0.3)' }
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' }
                        }
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.473.0/dist/umd/lucide.min.js"></script>

    <!-- tsParticles -->
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@3.0.3/tsparticles.bundle.min.js"></script>

    <!-- Import Map for React + HTM -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.3.1",
            "react-dom": "https://esm.sh/react-dom@18.3.1",
            "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
            "htm": "https://esm.sh/htm",
            "framer-motion": "https://esm.sh/framer-motion@11.0.8?deps=react@18.3.1"
        }
    }
    </script>

    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-brand-dark text-gray-100 font-sans selection:bg-brand-primary/30 selection:text-white">
    <!-- Particle Background -->
    <div id="tsparticles" class="fixed inset-0 -z-10"></div>
    
    <!-- Gradient Blobs -->
    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-brand-primary/10 blur-[120px] -z-20"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-brand-secondary/10 blur-[120px] -z-20"></div>

    <!-- App Root -->
    <div id="root"></div>

    <!-- Main App Script -->
    <script type="module" src="/js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepFake AI Detector | Verify Media Authenticity</title>
    <meta name="description"
        content="State-of-the-art AI Deepfake Detection for images, videos, and audio. Authenticate media content securely with premium precision.">
    <!-- Google Fonts for Modern Typography -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="dark-theme">

    <!-- Animated Background Elements -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <main class="app-container">

        <header class="app-header">
            <h1 class="logo">DeepFake<span>AI</span></h1>
            <p class="subtitle">Next-Generation Media Authenticity Analysis</p>
        </header>

        <div class="glass-panel main-panel">

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" data-type="image" onclick="switchTab('image')">
                    <svg viewBox="0 0 24 24" fill="none" class="tab-icon">
                        <path
                            d="M4 16L8.586 11.414C8.96106 11.0391 9.46967 10.8284 10 10.8284C10.5303 10.8284 11.0389 11.0391 11.414 11.414L16 16M14 14L15.586 12.414C15.9611 12.0391 16.4697 11.8284 17 11.8284C17.5303 11.8284 18.0389 12.0391 18.414 12.414L20 14M14 8H14.01M6 20H18C19.1046 20 20 19.1046 20 18V6C20 4.89543 19.1046 4 18 4H6C4.89543 4 4 4.89543 4 6V18C4 19.1046 4.89543 20 6 20Z"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    Image
                </button>
                <button class="tab-btn" data-type="video" onclick="switchTab('video')">
                    <svg viewBox="0 0 24 24" fill="none" class="tab-icon">
                        <path
                            d="M15 10L19.5528 7.72361C20.2177 7.39116 21 7.87465 21 8.61803V15.382C21 16.1253 20.2177 16.6088 19.5528 16.2764L15 14M5 18H13C14.1046 18 15 17.1046 15 16V8C15 6.89543 14.1046 6 13 6H5C3.89543 6 3 6.89543 3 8V16C3 17.1046 3.89543 18 5 18Z"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    Video
                </button>
                <button class="tab-btn" data-type="audio" onclick="switchTab('audio')">
                    <svg viewBox="0 0 24 24" fill="none" class="tab-icon">
                        <path
                            d="M19 11C19 14.866 15.866 18 12 18C8.13401 18 5 14.866 5 11M12 22V18M8 22H16M12 14C10.3431 14 9 12.6569 9 11V7C9 5.34315 10.3431 4 12 4C13.6569 4 15 5.34315 15 7V11C15 12.6569 13.6569 14 12 14Z"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    Audio
                </button>
            </div>

            <!-- Upload Zone -->
            <div id="drop-zone" class="drop-zone">
                <input type="file" id="file-input" hidden>
                <div class="upload-content">
                    <div class="upload-icon">
                        <svg viewBox="0 0 24 24" fill="none" class="cloud-icon">
                            <path
                                d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </div>
                    <p class="upload-title">Drag & Drop <span id="mode-text">Image</span></p>
                    <p class="upload-subtitle">or <span class="highlight">browse files</span></p>
                </div>
            </div>

            <!-- Analysis State (Hidden by default) -->
            <div id="analyze-state" class="analyze-state hidden">
                <div class="scanner-container">
                    <div class="media-preview" id="preview-container">
                        <!-- Preview injected by JS -->
                    </div>
                    <div class="scanner-line"></div>
                </div>
                <h3 class="analyzing-text">Running Deepfake Model...</h3>
                <p class="analyzing-sub">Extracting features and analyzing neural patterns</p>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progress-fill"></div>
                </div>
            </div>

            <!-- Results Panel (Hidden by default) -->
            <div id="results-panel" class="results-panel hidden">
                <div class="result-header">
                    <h2 class="result-title">Analysis Complete</h2>
                </div>

                <div class="verdict-card" id="verdict-card">
                    <div class="verdict-icon" id="verdict-icon">
                        <!-- Injected JS vector -->
                    </div>
                    <div class="verdict-text-group">
                        <h1 class="verdict-label" id="verdict-label">REAL</h1>
                        <p class="verdict-sublabel">Model Confidence Rating</p>
                        <div class="confidence-bar-wrapper">
                            <div class="confidence-bar-container">
                                <div class="confidence-bar" id="confidence-bar"></div>
                            </div>
                            <span class="confidence-value-text" id="confidence-value-display">0%</span>
                        </div>
                    </div>
                    <div class="confidence-circle">
                        <svg viewBox="0 0 36 36" class="circular-chart">
                            <path class="circle-bg"
                                d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path class="circle" id="confidence-ring" stroke-dasharray="0, 100"
                                d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <text x="18" y="20.35" class="percentage" id="confidence-text">0%</text>
                        </svg>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn-primary" onclick="resetApp()">Analyze Another</button>
                    <button class="btn-secondary" onclick="viewDetails()">Technical Details</button>
                </div>
            </div>

        </div>

        <!-- Technical Details Modal -->
        <div id="tech-modal" class="modal-overlay hidden">
            <div class="modal-content glass-panel">
                <div class="modal-header">
                    <h2>Technical Analysis</h2>
                    <button class="close-btn" onclick="closeDetails()">&times;</button>
                </div>
                <div class="modal-body">
                    <p class="tech-subtitle">Reasoning Algorithm Output:</p>
                    <p id="tech-reason-text" class="reason-text">No data available.</p>
                </div>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>

</html>
